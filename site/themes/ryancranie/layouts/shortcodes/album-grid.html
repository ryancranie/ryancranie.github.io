<div style="display:grid;grid-template-columns:repeat(3,1fr);
  gap:1.25rem;margin:2rem 0;">
  {{ range split .Inner "\n---\n" }}
    {{ $parts := split . "|" }}
    {{ if ge (len $parts) 3 }}
    <div style="text-align:center;">
      <div style="width:100%;padding-bottom:100%;position:relative;
        overflow:hidden;border-radius:4px;margin-bottom:0.5rem;">
        <img src="{{ index $parts 0 | trim " " }}"
          style="position:absolute;top:0;left:0;width:100%;height:100%;
            object-fit:cover;display:block;">
      </div>
      <p style="font-size:13px;color:rgba(255,255,255,0.8);
        margin:0 0 2px;font-weight:500;">{{ index $parts 1 | trim " " }}</p>
      <p style="font-family:'JetBrains Mono',monospace;font-size:11px;
        color:rgba(255,255,255,0.35);margin:0;">{{ index $parts 2 | trim " " }}</p>
    </div>
    {{ end }}
  {{ end }}
</div>
