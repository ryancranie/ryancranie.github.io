<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  {{ $css := resources.Get "css/main.css" }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary | truncate 160 }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta property="og:image" content="{{ if .Params.image }}{{ .Params.image | absURL }}{{ else }}{{ "/img/profile/ryan_profile_picture.jpg" | absURL }}{{ end }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary | truncate 160 }}{{ end }}">
  <meta name="twitter:image" content="{{ if .Params.image }}{{ .Params.image | absURL }}{{ else }}{{ "/img/profile/ryan_profile_picture.jpg" | absURL }}{{ end }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/img/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/img/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/icons/favicon.png">

  <!-- Canonical -->
  <link rel="canonical" href="{{ .Permalink }}">
</head>

    style="background:none;border:none;cursor:pointer;color:#fff;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

      color:rgba(255,255,255,0.6);font-size:20px;
      padding:1rem;align-self:flex-end;">✕</button>

<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'dark',
    themeVariables: {
      background: '#000000',
      primaryColor: '#000000',
      primaryTextColor: 'rgba(255,255,255,0.7)',
      primaryBorderColor: 'rgba(255,255,255,0.3)',
      lineColor: 'rgba(255,255,255,0.3)',
      fontSize: '13px'
    }
  });
</script>

<div class="carousel-fullscreen-overlay" id="fs-overlay"
  onclick="document.getElementById('fs-overlay').classList.remove('active')">
  <img id="fs-img" src="" />
</div>

<script>
var hb = document.getElementById('hamburger');
var sb = document.getElementById('sidebar');
var ov = document.getElementById('sidebar-overlay');
var cl = document.getElementById('sidebar-close');
function openSidebar(){ sb.classList.add('open'); ov.classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeSidebar(){ sb.classList.remove('open'); ov.classList.remove('active'); document.body.style.overflow = ''; }
if(hb) hb.addEventListener('click', openSidebar);
if(cl) cl.addEventListener('click', closeSidebar);
if(ov) ov.addEventListener('click', closeSidebar);
</script>
