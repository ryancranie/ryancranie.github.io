{{- $tagStr := "" -}}
{{- with .Params.tags -}}{{- $tagStr = delimit . "," | lower -}}{{- end -}}
<div class="post-row" data-tags="{{ $tagStr }}">
  <a href="{{ .RelPermalink }}" class="post-title">
    {{- if .Params.pinned -}}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5;vertical-align:middle;margin-right:6px;flex-shrink:0;" aria-hidden="true"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>{{- end -}}
    {{- .Title -}}
  </a>
  <div class="post-meta">
    <div class="post-tags">{{ range .Params.tags }}{{ partial "tag-pill.html" . }}{{ end }}</div>
    <span class="post-date"><span class="date-desktop">{{ .Date.Format "Jan 2006" }}</span><span class="date-mobile">{{ .Date.Format "01/06" }}</span></span>
  </div>
</div>
