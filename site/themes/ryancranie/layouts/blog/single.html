{{ define "main" }}
<div class="post-single">
<h1>{{ .Title }}</h1>
<div class="post-meta-line">
  <span>{{ .Date.Format "02 Jan 2006" }}</span>
  <span>·</span>
  {{ range first 1 .Params.tags }}{{ partial "tag-pill.html" . }}{{ end }}
</div>
{{ .Content }}
<div>
  <a href="/blog/" class="back-link">← back to blog</a>
</div>
</div>
{{ end }}
