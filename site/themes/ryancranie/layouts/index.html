{{ define "main" }}
<div class="hero">
  <div class="hero-photo-col">
    <img src="/img/ryan_profile_picture.png" alt="Ryan Cranie" class="hero-photo">
  </div>
  <div class="hero-bio">
    <h1>Ryan Cranie</h1>
    <p class="hero-subtitle">2nd Line IT Support · CompTIA N+ · S+ · WorldSkills Squad UK</p>
    {{ .Content }}
  </div>
</div>

<hr>

<div class="section-label">recent posts</div>
{{ $posts := partial "sorted-blog-posts.html" . }}
{{ range first 5 $posts }}

{{ end }}
{{ end }}
